<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seth at Sunset</title>
<link rel="stylesheet" href="style.css">
</head>

<body data-bg="zoo">

<div class="game">

  <div class="left">
    <img id="portrait" src="assets/portraits/seth_neutral.png">
    <div id="chapter"></div>
    <div id="vibe"></div>
  </div>

  <div class="right">
    <div id="speaker"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>

</div>

<!-- PHONE -->
<div id="phoneOverlay" class="overlay hidden">
  <div class="phone">
    <div id="messages"></div>
    <button onclick="closePhone()">Close</button>
  </div>
</div>

<!-- ENDING -->
<div id="ending" class="overlay hidden">
  <img id="cg">
  <h2 id="endTitle"></h2>
  <p id="endBody"></p>
  <button onclick="start()">Replay</button>
</div>

<script src="scenes.js"></script>
<script src="script.js"></script>

</body>
</html>
